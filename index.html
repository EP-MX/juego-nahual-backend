<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cancerbero · Nahuales vs Rancheros</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #050508;
  --bg-card: rgba(10,10,15,0.7);
  --text-primary: #F8F8F8;
  --text-secondary: #A1A1AA;
  --blood-red: #990F02;
  --blood-light: #E63946;
  --moonlight: #8ECAE6;
  --daylight: #F59E0B;
  --border-subtle: rgba(255,255,255,0.08);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100vh; background: var(--bg-base); color: var(--text-primary); font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
body {
  background:
    radial-gradient(ellipse at 20% 10%, rgba(142,202,230,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(153,15,2,0.20) 0%, transparent 60%),
    var(--bg-base);
  background-attachment: fixed;
  padding: 24px;
  overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 100;
  opacity: 0.08; mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: -0.01em; margin: 0.4em 0; }
h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1; }
h2 { font-size: 2rem; }
h3 { font-size: 1.4rem; color: #d0d0d0; }
p { line-height: 1.6; color: rgba(255,255,255,0.72); }
strong { color: #fff; font-weight: 600; }
hr { border: none; height: 1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent); margin: 22px 0; }

.pantalla {
  background: var(--bg-card);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--border-subtle);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.4);
  padding: 36px 32px;
  max-width: 560px;
  margin: 20px auto;
  border-radius: 2px;
}

input, input[type="text"] {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  outline: none;
  color: var(--text-primary);
  font-family: 'Manrope', sans-serif;
  font-size: 1.1rem;
  padding: 12px 4px;
  width: 100%;
  transition: border-color 0.3s ease;
  margin: 8px 0;
}
input:focus { border-color: rgba(255,255,255,0.7); }
input#input-codigo { font-family: 'Space Mono', monospace; letter-spacing: 0.35em; text-transform: uppercase; text-align: center; font-size: 1.6rem; }

button {
  background: var(--blood-red);
  color: #fff;
  border: none;
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  padding: 14px 22px;
  cursor: pointer;
  transition: background-color 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
  margin: 4px 3px;
  border-radius: 2px;
}
button:hover { background: var(--blood-light); box-shadow: 0 0 30px rgba(230,57,70,0.35); }
button:active { transform: scale(0.97); }
button[style*="background: #00ff00"], button[style*="background:#00ff00"] {
  background: rgba(52,211,153,0.15) !important;
  color: #34D399 !important;
  border: 1px solid rgba(52,211,153,0.5);
}
button[style*="background: red"], button[style*="background:red"] {
  background: rgba(230,57,70,0.15) !important;
  color: var(--blood-light) !important;
  border: 1px solid rgba(230,57,70,0.4);
}
button[style*="background: orange"], button[style*="background:orange"], button[style*="background:yellow"] {
  background: rgba(245,158,11,0.12) !important;
  color: var(--daylight) !important;
  border: 1px solid rgba(245,158,11,0.4);
}
button[style*="background:#555"], button[style*="background: #555"] {
  background: transparent !important;
  color: var(--text-secondary) !important;
  border: 1px solid rgba(255,255,255,0.2);
}
button[style*="background-color: white"] {
  background: var(--blood-red) !important;
  color: #fff !important;
  animation: pulseBlood 2.8s ease-in-out infinite;
}
@keyframes pulseBlood {
  0%,100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.4); }
  50% { box-shadow: 0 0 40px 6px rgba(230,57,70,0); }
}

label { color: var(--text-secondary); font-size: 0.9rem; display: inline-block; margin: 4px 0; cursor: pointer; }
label input[type="checkbox"] { accent-color: var(--blood-light); margin-right: 8px; }

ul { list-style: none; padding: 0; }
ul li {
  padding: 10px 14px;
  border: 1px solid var(--border-subtle);
  margin: 6px 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  background: rgba(20,20,30,0.4);
  border-radius: 2px;
}

#display-codigo {
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.3em;
  background: linear-gradient(180deg, #F59E0B 0%, #E63946 70%, #990F02 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  font-size: 2.2rem;
}
#display-rol {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  background: linear-gradient(180deg, #F8F8F8 0%, #8ECAE6 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
#mensaje-error { font-size: 0.85rem; color: var(--blood-light) !important; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; }
#etiqueta-rol { color: var(--text-secondary); font-family: 'Space Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3em; }
#seleccion-cupido { color: #EC4899; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; }
#seleccion-roles { background: rgba(0,0,0,0.3); padding: 16px 20px; border: 1px solid var(--border-subtle) !important; border-radius: 2px; }
#controles-juego { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-subtle); }
#controles-juego p { margin: 10px 0; }
#controles-juego h2, #controles-juego h3 { color: #fff; margin-top: 18px; }

.top-bar { max-width: 560px; margin: 0 auto 12px; display: flex; justify-content: space-between; align-items: center; }
.top-bar h1 { font-size: 1.6rem; font-style: italic; margin: 0; color: rgba(255,255,255,0.85); }
.top-bar .logout-btn { background: transparent; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.15); padding: 8px 14px; font-size: 0.65rem; }
.top-bar .logout-btn:hover { background: rgba(230,57,70,0.1); color: var(--blood-light); border-color: rgba(230,57,70,0.4); box-shadow: none; }

.overline { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
::selection { background: rgba(230,57,70,0.4); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Cancerbero</h1>
  <button class="logout-btn" onclick="salirDePartida()">Cerrar sesión</button>
</div>

<!-- PANTALLA 1: LOGIN -->
<div id="pantalla-login" class="pantalla">
  <p class="overline">Un juego de engaño</p>
  <h2 style="font-style: italic; margin-top: 4px;">Confía en nadie. Sospecha de todos.</h2>
  <p style="margin-bottom: 28px;">Ingresa el código de la sala para unirte al pueblo.</p>

  <label class="overline">Tu nombre</label>
  <input type="text" id="input-nombre" placeholder="Nombre">

  <label class="overline" style="margin-top:18px; display:block;">Código de sala</label>
  <input type="text" id="input-codigo" placeholder="XXXX" maxlength="4">

  <button onclick="unirseSala()" style="width:100%; margin-top: 20px; padding: 16px;">Unirse a sala</button>
  <p id="mensaje-error"></p>

  <hr>
  <p class="overline" style="text-align:center;">¿Quieres ser el narrador?</p>
  <button onclick="crearSala()" style="width:100%; background: transparent; color: var(--text-primary); border: 1px solid rgba(255,255,255,0.2);"
    onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='transparent'">
    Crear sala nueva
  </button>
</div>

<!-- PANTALLA 2: LOBBY -->
<div id="pantalla-lobby" class="pantalla" style="display: none;">
  <p class="overline" id="titulo-sala">Sala activa · <span id="display-codigo"></span></p>
  <p style="margin-top: 8px;"><span id="etiqueta-rol">Tu rol · </span><strong id="display-rol">Esperando inicio…</strong></p>

  <h3 id="titulo-jugadores" style="margin-top: 22px;">Reunidos en el pueblo</h3>
  <ul id="lista-jugadores"></ul>

  <button id="btn-iniciar" onclick="iniciarPartida()" style="display:none; background-color: white; color: black; width: 100%; margin-top: 16px; padding: 18px;">
    Comenzar partida
  </button>

  <div id="seleccion-roles" style="display:none; margin-top:18px;">
    <p class="overline">Roles especiales a incluir</p>
    <label><input type="checkbox" class="rol-especial" value="Vidente" checked> Vidente</label><br>
    <label><input type="checkbox" class="rol-especial" value="Bruja" checked> Bruja</label><br>
    <label><input type="checkbox" class="rol-especial" value="Cupido" checked> Cupido</label><br>
    <label><input type="checkbox" class="rol-especial" value="Cazador" checked> Cazador</label><br>
    <label><input type="checkbox" class="rol-especial" value="Niña" checked> Niña</label>
  </div>
</div>

<script>
        //const API_URL = "http://127.0.0.1:8000";
        //let API_URL = "http://127.0.0.1:8000"; //multiples jugadores
        const API_URL = "https://nahuales-vs-rancheros.onrender.com";   
        let miNombre = "";
        let miSala = "";
        let miToken = "";
        let intervaloActualizacion;
        let pollingPausado = false;

        //Pruebas en pantalla
        



       // Función 1: Crear Sala
        async function crearSala() {
    miNombre = document.getElementById("input-nombre").value;
    if (!miNombre) return alert("Pon un nombre");

    const respuesta = await fetch(`${API_URL}/crear-sala`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ nombre_narrador: miNombre })
    });
    
    if (respuesta.ok) {
        const datos = await respuesta.json();
        miSala = datos.codigo;
        miToken = datos.token;
        
        localStorage.setItem("lobo_nombre", miNombre);
        localStorage.setItem("lobo_sala", miSala);
        localStorage.setItem("lobo_token", miToken);
        localStorage.setItem("es_narrador", "true");

        entrarAlLobby(true);
    }
}

        // Función 2: Unirse a Sala
        async function unirseSala() {
    miNombre = document.getElementById("input-nombre").value;
    miSala = document.getElementById("input-codigo").value.trim().toUpperCase();
    if (!miNombre || !miSala) return alert("Faltan datos");

    const respuesta = await fetch(`${API_URL}/unirse-sala`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ 
            nombre_jugador: miNombre, 
            codigo_sala: miSala,
            token: localStorage.getItem("lobo_token") || null
        })
    });

    if (respuesta.ok) {
        const datos = await respuesta.json();
        miToken = datos.token;

        localStorage.setItem("lobo_nombre", miNombre);
        localStorage.setItem("lobo_sala", miSala);
        localStorage.setItem("lobo_token", miToken);
        localStorage.setItem("es_narrador", "false");

        entrarAlLobby(false);
    } else {
        const error = await respuesta.json();
        document.getElementById("mensaje-error").innerText = error.detail;
    }
}

        function entrarAlLobby(esNarrador) {
            document.getElementById("pantalla-login").style.display = "none";
            document.getElementById("pantalla-lobby").style.display = "block";
            document.getElementById("display-codigo").innerText = miSala;
            
            // Mantenemos tu lógica original:
            if (esNarrador) {
        document.getElementById("btn-iniciar").style.display = "block";
        document.getElementById("seleccion-roles").style.display = "block";
        document.getElementById("display-rol").innerText = "NARRADOR";
    } else {
        document.getElementById("btn-iniciar").style.display = "none";
        document.getElementById("seleccion-roles").style.display = "none";
    }

            actualizarSala();

            if (intervaloActualizacion) clearInterval(intervaloActualizacion);
            
            intervaloActualizacion = setInterval(actualizarSala, 2000);
        }
            let enamoradosElegidos = [];

        function seleccionarEnamorado(nombre) {
            if (enamoradosElegidos.length >= 2) return;
            if (enamoradosElegidos.includes(nombre)) return;
            enamoradosElegidos.push(nombre);
            document.getElementById("seleccion-cupido").innerText = "Elegidos: " + enamoradosElegidos.join(" y ");
            if (enamoradosElegidos.length === 2) {
                document.getElementById("btn-confirmar-cupido").style.display = "block";
            }
        }

        async function usarCazador(nombreObjetivo) {
    await fetch(`${API_URL}/accion/cazador`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_cazador: miNombre, nombre_objetivo: nombreObjetivo, token: miToken })
    });
}

async function enviarCupido() {
    await fetch(`${API_URL}/accion/cupido`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_cupido: miNombre, enamorado_1: enamoradosElegidos[0], enamorado_2: enamoradosElegidos[1], token: miToken })
    });
    enamoradosElegidos = []; 
    pollingPausado = false; 
}

async function votarLobo(nombreVictima) {
    await fetch(`${API_URL}/accion/lobos`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_lobo: miNombre, nombre_objetivo: nombreVictima, token: miToken })
    });
}

async function votarDia(nombreAcusado) {
    await fetch(`${API_URL}/accion/votar-dia`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_votante: miNombre, nombre_acusado: nombreAcusado, token: miToken })
    });
}

async function usarVidente(nombreObjetivo) {
    const respuesta = await fetch(`${API_URL}/accion/vidente`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_vidente: miNombre, nombre_objetivo: nombreObjetivo, token: miToken })
    });
    if (respuesta.ok) {
        const resultado = await respuesta.json();
        alert(`Tu bola de cristal muestra que... ${nombreObjetivo} es ${resultado.rol_descubierto}`);
    } else {
        const error = await respuesta.json();
        alert("Error: " + error.detail);
    }
}

async function anunciarDia() {
    await fetch(`${API_URL}/narrador/avanzar`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_narrador: miNombre, token: miToken })
    });
}

async function anunciarNoche() {
    await fetch(`${API_URL}/narrador/avanzar`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_narrador: miNombre, token: miToken })
    });
}

async function usarBruja(salvar, objetivoMuerte) {
    await fetch(`${API_URL}/accion/bruja`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ codigo_sala: miSala, nombre_bruja: miNombre, usar_pocion_vida: salvar, objetivo_pocion_muerte: objetivoMuerte, token: miToken })
    });
}
        //let ultimoEstadoConocido = ""; 
        // Función 4: Obtener datos de la sala en tiempo real

        async function actualizarSala() {
            if (pollingPausado) return;
            const tiempo = new Date().getTime();
            const respuesta = await fetch(`${API_URL}/sala/${miSala}?t=${tiempo}`, { 
                cache: "no-store",
                headers: {
                    'Pragma': 'no-cache',
                    'Cache-Control': 'no-cache'
                }
            });

            if (respuesta.status === 404) {
                if (intervaloActualizacion) clearInterval(intervaloActualizacion);
                localStorage.clear(); // Borramos su huella del navegador
                alert("La partida ha sido reiniciada o finalizada. Volviendo al menú principal.");
                location.reload(); // Recargamos la página al inicio
                return;
            }

            const sala = await respuesta.json();
            const ul = document.getElementById("lista-jugadores");
            ul.innerHTML = ""; 
            let miRol = "narrador";
            let estoyVivo = true;

            const cicloCurrent = sala.ciclo || 1;
            const estadosNocturnosOcultos = ["turno_cupido", "turno_vidente", "turno_lobos", "turno_bruja", "confirmando_lobos", "esperando_narrador_dia", "turno_cazador"];
            sala.jugadores.forEach(jugador => {
                const li = document.createElement("li");
                const muertoEsteCiclo = jugador.ciclo_muerte === cicloCurrent;
                const esFaseNocturna = estadosNocturnosOcultos.includes(sala.estado);
                const ocultarPorNoche = muertoEsteCiclo && esFaseNocturna;
                const muertoAntes = jugador.vivo === false && (jugador.ciclo_muerte || 0) < cicloCurrent;
                const mostrarMuerto = (jugador.vivo === false && !ocultarPorNoche) || muertoAntes;

                let texto = `${jugador.nombre} - ${mostrarMuerto ? "💀 MUERTO" : "VIVO"}`;
                if (sala.estado === "esperando_jugadores" || miNombre === jugador.nombre || miNombre === sala.jugadores[0].nombre) {
                    texto += ` (${jugador.rol})`; 
                }
                li.innerText = texto;
                ul.appendChild(li);
                
                if(jugador.nombre === miNombre) {
                    miRol = jugador.rol;
                    estoyVivo = jugador.vivo;
                    if(sala.estado !== "esperando_jugadores" && miRol !== "narrador") {
                        const soyMuertoEsteCiclo = jugador.ciclo_muerte === cicloCurrent;
                        const soyMuertoAntes = !estoyVivo && (jugador.ciclo_muerte || 0) < cicloCurrent;
                        const mostrarComoMuerto = soyMuertoAntes || (!estoyVivo && !(soyMuertoEsteCiclo && esFaseNocturna));
                        document.getElementById("display-rol").innerText = miRol + (mostrarComoMuerto ? " (FANTASMA)" : "");
                    }
                }
            });

            // --- INICIO DE CAMBIO: Ocultar info a jugadores ---
            const esNarrador = (miRol === "narrador");
            document.getElementById("titulo-sala").style.display = esNarrador ? "block" : "none";
            document.getElementById("titulo-jugadores").style.display = esNarrador ? "block" : "none";
            document.getElementById("lista-jugadores").style.display = esNarrador ? "block" : "none";
            document.getElementById("etiqueta-rol").style.display = esNarrador ? "inline" : "none";
            // --- FIN DE CAMBIO ---

            // 2. Control del botón de inicio (solo Narrador)
            if(sala.estado !== "esperando_jugadores") {
                document.getElementById("btn-iniciar").style.display = "none";
                const selRoles = document.getElementById("seleccion-roles");
                if (selRoles) selRoles.style.display = "none";
            }

            // 3. MÁQUINA DE ESTADOS VISUAL (Lo que se ve en depende del turno)
           
            let controlesHTML = esNarrador ? `<h3>Estado: ${sala.estado.toUpperCase()}</h3>` : ``;

            const miJugador = sala.jugadores.find(j => j.nombre === miNombre);
            const soyMuertoEsteCicloControles = miJugador?.ciclo_muerte === cicloCurrent;
            const soyMuertoAntesControles = !estoyVivo && (miJugador?.ciclo_muerte || 0) < cicloCurrent;
            const mostrarComoMuertoEnControles = soyMuertoAntesControles || (!estoyVivo && !(soyMuertoEsteCicloControles && estadosNocturnosOcultos.includes(sala.estado)));

            if (mostrarComoMuertoEnControles && sala.estado !== "turno_cazador" && sala.estado !== "victoria_lobos" && sala.estado !== "victoria_aldeanos") {
                controlesHTML += `<p>Estás muerto. Observa en silencio.</p>`;
            }
            // TURNO: CUPIDO
            else if (sala.estado === "turno_cupido" && miRol === "Cupido") {
                pollingPausado = true; 
                controlesHTML += `<p>Selecciona a dos enamorados:</p>`;
                sala.jugadores.filter(j => j.rol !== 'narrador').forEach(j => {
                    controlesHTML += `<button onclick="seleccionarEnamorado('${j.nombre}')">${j.nombre}</button> `;
                });
                controlesHTML += `<p id="seleccion-cupido"></p>
                                <button id="btn-confirmar-cupido" style="display:none; background: #00ff00; color: black;" onclick="enviarCupido()">Lanzar Flechas</button>`;
            } 
            // TURNO: VIDENTE (Faltaba en la nueva)
            else if (sala.estado === "turno_vidente" && miRol === "Vidente") {
                controlesHTML += `<p style="color:#aaa; font-style:italic;">La oscuridad no puede ocultar todos los secretos.<br>Vidente, abre los ojos.<br>El destino te concede una oportunidad para descubrir la verdad... úsala con sabiduría.</p>`;
                controlesHTML += `<p>¿A quién quieres investigar?</p>`;
                sala.jugadores.filter(j => j.nombre !== miNombre && j.rol !== 'narrador').forEach(j => {
                    controlesHTML += `<button onclick="usarVidente('${j.nombre}')">Ver rol de ${j.nombre}</button> `;
                });
            }
                        // TURNO: LOBOS
            // TURNO: LOBOS
            else if (sala.estado === "turno_lobos" && miRol === "Hombre Lobo") {
                controlesHTML += `<p style="color:#aaa; font-style:italic;">En la oscuridad... los depredadores despiertan.<br>Lobos, abran los ojos.<br>Su presa duerme sin sospechar. Elijan con cuidado... porque esta decisión cambiará el destino de la aldea.</p>`;
                const votosLobos = sala.votos_lobos || [];
                const yoVote = votosLobos.find(v => v.lobo === miNombre);

                if (yoVote) {
                    controlesHTML += `<p style="color:#00ff00">Seleccionaste a <strong>${yoVote.voto}</strong> para eliminarlo.</p>`;
                } else {
                    controlesHTML += `<p>¿A quién van a devorar?</p>`;
                    sala.jugadores.filter(j => j.vivo && j.rol !== 'narrador' && j.rol !== 'Hombre Lobo').forEach(j => {
                        controlesHTML += `<button onclick="votarLobo('${j.nombre}')">Matar a ${j.nombre}</button> `;
                    });
                }

                controlesHTML += `<p style="margin-top:10px">Votos actuales:</p>`;
                const lobosVivos = sala.jugadores.filter(j => j.rol === 'Hombre Lobo' && j.vivo);
                lobosVivos.forEach(lobo => {
                    const voto = votosLobos.find(v => v.lobo === lobo.nombre);
                    controlesHTML += `<p>${lobo.nombre}: ${voto ? `→ ${voto.voto}` : "esperando..."}</p>`;
                });

                if (votosLobos.length === lobosVivos.length && votosLobos.length > 0) {
                    const todosIgual = votosLobos.every(v => v.voto === votosLobos[0].voto);
                    if (todosIgual) {
                        controlesHTML += `<p style="color:red">¡Consenso! Eliminando a ${votosLobos[0].voto} en 5 segundos...</p>`;
                    } else {
                        controlesHTML += `<p style="color:orange">No hay unanimidad. Nadie morirá esta noche.</p>`;
                    }
                }
            }
            // CONFIRMACION LOBOS
            else if (sala.estado === "confirmando_lobos" && miRol === "Hombre Lobo") {
                const votosLobos = sala.votos_lobos || [];
                const yoVote = votosLobos.find(v => v.lobo === miNombre);
                const todosIgual = votosLobos.length > 0 && votosLobos.every(v => v.voto === votosLobos[0].voto);

                if (yoVote) {
                    controlesHTML += `<p style="color:#00ff00">Seleccionaste a <strong>${yoVote.voto}</strong> para eliminarlo.</p>`;
                }

                controlesHTML += `<p style="margin-top:10px">Votos finales:</p>`;
                votosLobos.forEach(v => {
                    controlesHTML += `<p>${v.lobo} → <strong>${v.voto}</strong></p>`;
                });

                if (todosIgual) {
                    controlesHTML += `<p style="color:red">¡Consenso! <strong>${votosLobos[0].voto}</strong> será eliminado...</p>`;
                } else {
                    controlesHTML += `<p style="color:orange">Sin unanimidad. Nadie muere esta noche.</p>`;
                }
            }

            // TURNO: Bruja
            else if (sala.estado === "turno_bruja" && miRol === "Bruja") {
                controlesHTML += `<p style="color:#aaa; font-style:italic;">No toda la magia sirve para destruir.<br>Bruja, despierta.<br>En tus manos está el poder de alterar el destino... salvar una vida... o dejar que la noche cobre otra víctima.</p>`;
                const victima = sala.victima_lobos;
                const brujaData = sala.jugadores.find(j => j.nombre === miNombre); // <-- ESTA LÍNEA FALTABA
                controlesHTML += `<p>Los lobos van a matar a: <strong>${victima ?? "nadie"}</strong></p>`;

                if (victima && brujaData?.pocion_vida !== false) {
                    controlesHTML += `<button onclick="usarBruja(true, null)">Salvar a ${victima} (poción de vida)</button> `;
                }

                if (brujaData?.pocion_muerte !== false) {
                    controlesHTML += `<p>¿Usar poción de muerte?</p>`;
                    sala.jugadores.filter(j => j.vivo && j.rol !== 'narrador').forEach(j => {
                        controlesHTML += `<button onclick="usarBruja(false, '${j.nombre}')">Matar a ${j.nombre}</button> `;
                    });
                }
                
                controlesHTML += `<br><button onclick="usarBruja(false, null)" style="background:#00ff00;color:black">Pasar (no usar pociones)</button>`;
            }

            else if (sala.estado === "turno_cazador" && miRol === "Cazador") {
                controlesHTML += `<p style="color:red; font-weight:bold;">¡ÚLTIMO ALIENTO!</p>`;
                controlesHTML += `<p>Has muerto, pero puedes llevarte a alguien contigo.</p>`;
                controlesHTML += `<p>¿A quién dispararás?</p>`;
                
                sala.jugadores.filter(j => j.vivo && j.rol !== 'narrador' && j.nombre !== miNombre).forEach(j => {
                    controlesHTML += `<button onclick="usarCazador('${j.nombre}')">Disparar a ${j.nombre}</button> `;
                });
            }
            // TURNO: DÍA (Votación)
            else if (sala.estado === "dia" && miRol !== "narrador") {
                const votosDia = sala.votos_dia || [];
                const yoVote = votosDia.find(v => v.votante === miNombre);

                // Anuncio de muertes de la noche - solo se ve cuando ya es de día
                const reporteMuertes = sala.reporte_muertes || [];
                if (reporteMuertes.length > 0) {
                    controlesHTML += `<p style="color:red">Esta noche murieron: <strong>${reporteMuertes.join(", ")}</strong></p>`;
                } else {
                    controlesHTML += `<p style="color:gray">Esta noche no murió nadie.</p>`;
                }
                const jugadoresVivos = sala.jugadores.filter(j => j.vivo && j.rol !== 'narrador');

                // En la sección else if (sala.estado === "dia" && miRol !== "narrador")
                if (yoVote) {
                    controlesHTML += `<p style="color:#00ff00">Votaste por <strong>${yoVote.acusado === 'abstencion' ? 'Abstenerse' : yoVote.acusado}</strong>.</p>`;
                } else {
                    controlesHTML += `<p>¿A quién quieren linchar?</p>`;
                    
                    // Botones para votar a jugadores
                    sala.jugadores.filter(j => j.vivo && j.rol !== 'narrador' && j.nombre !== miNombre).forEach(j => {
                        controlesHTML += `<button onclick="votarDia('${j.nombre}')">Votar por ${j.nombre}</button> `;
                    });

                    // --- NUEVO BOTÓN DE ABSTENCIÓN ---
                    controlesHTML += `<br><button onclick="votarDia('abstencion')" style="background-color: #555; color: white;"> No votar </button>`;
                }

                // Conteo de votos en tiempo real
                controlesHTML += `<p style="margin-top:10px">Votos actuales (${votosDia.length}/${jugadoresVivos.length}):</p>`;
                
                // Contar cuántos votos tiene cada acusado
                const conteo = {};
                votosDia.forEach(v => {
                    conteo[v.acusado] = (conteo[v.acusado] || 0) + v.peso;
                });

                // Mostrar a cada jugador vivo con sus votos
                sala.jugadores.filter(j => j.vivo && j.rol !== 'narrador').forEach(j => {
                    const votos = conteo[j.nombre] || 0;
                    const barra = votos > 0 ? `→ ${votos} voto${votos > 1 ? 's' : ''}` : 'sin votos';
                    controlesHTML += `<p>${j.nombre}: ${barra}</p>`;
                });
            }
            // FIN DEL JUEGO 
            else if (sala.estado === "victoria_lobos" || sala.estado === "victoria_aldeanos") {
                const ganador = sala.estado === "victoria_lobos" ? "LOS LOBOS " : "LOS ALDEANOS ";
                controlesHTML += `<h2 style="color: gold;">¡JUEGO TERMINADO!</h2>
                                <h3>Ganadores: ${ganador}</h3>
                                <button onclick="location.reload()">Jugar otra vez</button>`;
            } 
            // PANEL DEL NARRADOR
else if (miRol === "narrador") {
    if (sala.estado === "esperando_jugadores") {
        controlesHTML += `<p>Esperando jugadores... cuando estén todos presiona EMPEZAR JUEGO.</p>`;
    } else {

        const diaActual = sala.ciclo || 1;
        controlesHTML += `<p style="color:#00ff00; font-size: 1.2em; border-bottom: 1px solid #00ff00; padding-bottom: 5px;">
            Noches en el rancho: ${diaActual}
        </p>`;

        //controlesHTML += `<p style="color:yellow">--- PANEL DEL NARRADOR ---</p>`;

        // Info de enamorados (solo si ya hay alguno)
        const enamorados = sala.jugadores.filter(j => j.enamorado);
        if (enamorados.length > 0) {
            controlesHTML += `<p> Enamorados: ${enamorados.map(j => j.nombre).join(" y ")}</p>`;
        }

        // Info de la Bruja (solo si está viva)
        const bruja = sala.jugadores.find(j => j.rol === "Bruja" && j.vivo);
        if (bruja) {
            controlesHTML += `<p> Bruja (${bruja.nombre}): 
                Poción vida: ${bruja.pocion_vida ? " disponible" : " gastada"} | 
                Poción muerte: ${bruja.pocion_muerte ? " disponible" : " gastada"}
            </p>`;
        }

        // Turno activo info
        controlesHTML += `<p style="color:gray">Turno activo: ${sala.estado}</p>`;

        // Botón "Se hizo de día" - cuando toda la noche terminó
        if (sala.estado === "esperando_narrador_dia") {
            const reporteMuertes = sala.reporte_muertes || [];
            if (reporteMuertes.length > 0) {
                controlesHTML += `<p style="color:red"> Murieron esta noche: <strong>${reporteMuertes.join(", ")}</strong></p>`;
            } else {
                controlesHTML += `<p style="color:gray">Esta noche no murió nadie.</p>`;
            }
            controlesHTML += `
                <p style="color:gray">Anuncia las muertes y presiona:</p>
                <button style="background:orange;color:black;margin-top:10px" onclick="anunciarDia()"> Se hizo de día</button>
            `;
        }

        // Fase de día - solo muestra conteo de votos
        if (sala.estado === "dia") {
            const votosDia = sala.votos_dia || [];
            const jugadoresVivos = sala.jugadores.filter(j => j.vivo && j.rol !== "narrador");
            controlesHTML += `<p style="color:yellow">La votación del pueblo está en curso...</p>`;
            controlesHTML += `<p>Votos: ${votosDia.length} / ${jugadoresVivos.length}</p>`;
        }

        // Botón "Se hizo de noche" - cuando la votación terminó y el narrador anuncia
        if (sala.estado === "esperando_narrador_noche") {
            const ultimoLinchado = sala.ultimo_linchado || [];
            if (ultimoLinchado.length > 0) {
                controlesHTML += `<p style="color:red"> Eliminados: <strong>${ultimoLinchado.join(", ")}</strong></p>`;
            } else {
                controlesHTML += `<p style="color:gray">Hubo empate, nadie fue eliminado.</p>`;
            }
            controlesHTML += `
                <p style="color:gray">Anuncia al eliminado y presiona:</p>
                <button style="background:yellow;color:black;margin-top:10px" onclick="anunciarNoche()">🌙 Se hizo de noche</button>
            `;
        }
    }
}

// ESPERANDO QUE EL NARRADOR ANUNCIE EL DÍA
            else if (sala.estado === "esperando_narrador_dia" && miRol !== "narrador") {
                controlesHTML += `<p style="color:#aaa; font-style:italic;">La noche termina... y los primeros rayos del sol iluminan la aldea.<br>Pero no todos despertarán esta mañana.<br>Abran los ojos...</p>`;
            }

            // ESPERANDO QUE EL NARRADOR ANUNCIE LA NOCHE
            else if (sala.estado === "esperando_narrador_noche" && miRol !== "narrador") {
                const ultimoLinchado = sala.ultimo_linchado || [];
                if (ultimoLinchado.length > 0) {
                    controlesHTML += `<p style="color:red"> Eliminados: <strong>${ultimoLinchado.join(", ")}</strong></p>`;
                } else {
                    controlesHTML += `<p style="color:gray">Hubo empate, nadie fue eliminado.</p>`;
                }
                controlesHTML += `<p> El día termina... esperando al Narrador.</p>`;
            }

            // ESPERA jugadores normales
            else {
                const esDeNoche = ["turno_cupido", "turno_vidente", "turno_lobos", "confirmando_lobos", "turno_bruja", "turno_cazador", "esperando_narrador_noche"].includes(sala.estado);
                
                if (esDeNoche) {
                    controlesHTML += `<p style="color:#aaa; font-style:italic;">El sol desaparece detrás de las montañas.<br>Una niebla cubre la aldea y el silencio reemplaza las risas.<br>Cierren los ojos... la noche ha comenzado.<br>Y recuerden... quien abra los ojos cuando no debe... podría descubrir algo que desearía no haber visto jamás.</p>`;
                } else {
                    controlesHTML += `<p>Espera tu turno... el Narrador o los otros personajes están actuando.</p>`;
                }
            }

            // Inyectamos los controles en un div nuevo
            let divControles = document.getElementById("controles-juego");
            if (!divControles) {
                divControles = document.createElement("div");
                divControles.id = "controles-juego";
                document.getElementById("pantalla-lobby").appendChild(divControles);
            }
            divControles.innerHTML = controlesHTML;
        }

        // Función 5: Iniciar Juego (Solo Narrador)
        async function iniciarPartida() {
            const rolesSeleccionados = Array.from(document.querySelectorAll(".rol-especial:checked")).map(cb => cb.value);

            const respuesta = await fetch(`${API_URL}/iniciar-juego`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    codigo_sala: miSala,
                    nombre_narrador: miNombre,
                    token: miToken,
                    roles_seleccionados: rolesSeleccionados
                })
            });

            if (!respuesta.ok) {
                const error = await respuesta.json();
                alert("No se pudo iniciar: " + error.detail);
            }
        }

        // Para volver Al cargar la página, revisamos si ya había una sesión activa
        window.onload = async function() {

            // --- MODO DEBUG: si la URL trae estos datos, entra directo sin tocar localStorage ---
            const params = new URLSearchParams(window.location.search);
            const debugNombre = params.get("debug_nombre");
            const debugSala = params.get("debug_sala");
            const debugToken = params.get("debug_token");
            const debugApi = params.get("debug_api");

            if (debugNombre && debugSala && debugToken) {
                if (debugApi) API_URL = debugApi;
                miNombre = debugNombre;
                miSala = debugSala;
                miToken = debugToken;
                entrarAlLobby(params.get("debug_narrador") === "true");
                return; // no usamos localStorage aquí, así cada iframe queda independiente
            }

            // Borrar solo para pruebas 

    const nombreGuardado = localStorage.getItem("lobo_nombre");
    const salaGuardada = localStorage.getItem("lobo_sala");
    const tokenGuardado = localStorage.getItem("lobo_token");
    const eraNarrador = localStorage.getItem("es_narrador") === "true";

    if (nombreGuardado && salaGuardada && tokenGuardado) {
        const verificacion = await fetch(`${API_URL}/sala/${salaGuardada}`);
        if (!verificacion.ok) {
            localStorage.clear();
            return;
        }
        const sala = await verificacion.json();
        if (sala.estado === "victoria_lobos" || sala.estado === "victoria_aldeanos") {
            localStorage.clear();
            return;
        }

        miNombre = nombreGuardado;
        miSala = salaGuardada;
        miToken = tokenGuardado;

        if (eraNarrador) {
            entrarAlLobby(true);
            return;
        }

        const estoyEnLaSala = sala.jugadores.some(j => j.nombre.toLowerCase() === miNombre.toLowerCase());
        if (estoyEnLaSala) {
            entrarAlLobby(false);
        } else {
            localStorage.clear();
            location.reload();
        }
    }
};

        function salirDePartida() {
        if(confirm("¿Seguro que quieres salir? no puedes regresar al juego actual.")) {
            localStorage.clear(); // Limpia la memoria
            location.reload();    // Recarga al login
        }
}

</script>
